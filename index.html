<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clasroyale Replica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1c2c;
    color: #eee;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }
  #topbar {
    width: 540px;
    max-width: 100vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 600;
  }
  #timer { font-size: 22px; letter-spacing: 1px; }
  #timer.double { color: #d774ff; }
  .crowns { min-width: 110px; }
  .crowns.right { text-align: right; }
  #arena3d canvas { border-radius: 8px; cursor: crosshair; display: block; max-width: 100vw; }
  #bottombar {
    width: 540px;
    max-width: 100vw;
    background: #24273a;
    border-radius: 0 0 10px 10px;
    padding: 10px 12px 12px;
  }
  #cardrow { display: flex; gap: 10px; align-items: stretch; }
  #nextwrap { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  #nextwrap .label { font-size: 10px; color: #99a; margin-bottom: 3px; }
  .card {
    background: #3a3f5c;
    border: 2px solid #555c85;
    border-radius: 8px;
    width: 86px;
    padding: 6px 4px 5px;
    text-align: center;
    cursor: pointer;
    transition: transform .08s, border-color .08s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); }
  .card.selected { border-color: #ffd83d; background: #4a5078; }
  .card.unaffordable { opacity: .45; cursor: default; }
  .card.unaffordable:hover { transform: none; }
  .card .emoji { font-size: 30px; line-height: 1.2; }
  .card .cname { font-size: 11px; margin-top: 2px; white-space: nowrap; }
  .card .cost {
    position: absolute; top: -7px; left: -7px;
    background: #b14fd8; border: 2px solid #e2a6ff; border-radius: 50%;
    width: 24px; height: 24px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .card.mini { width: 56px; padding: 4px 2px 3px; cursor: default; }
  .card.mini .emoji { font-size: 20px; }
  .card.mini .cost { width: 19px; height: 19px; font-size: 11px; top: -6px; left: -6px; }
  #elixirrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  #elixirnum { font-size: 18px; font-weight: 700; color: #d774ff; width: 26px; text-align: center; }
  #elixirbar {
    flex: 1; height: 16px; background: #161825;
    border-radius: 8px; overflow: hidden; display: flex; gap: 2px; padding: 2px;
  }
  #elixirbar .seg { flex: 1; border-radius: 4px; background: #2c2f45; }
  #elixirbar .seg.full { background: linear-gradient(180deg, #e08bff, #a13fd0); }
  #overlay {
    position: fixed; inset: 0; background: rgba(10, 10, 20, .75);
    display: none; align-items: center; justify-content: center; flex-direction: column;
    gap: 18px; z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay h1 { font-size: 46px; }
  #overlay h2 { font-size: 20px; font-weight: 400; color: #bbc; }
  #overlay button {
    font-size: 20px; padding: 12px 34px; border: none; border-radius: 10px;
    background: #ffd83d; color: #222; font-weight: 700; cursor: pointer;
  }
  #overlay button:hover { background: #ffe680; }
  #hint { font-size: 12px; color: #889; padding: 6px; text-align: center; }
</style>
</head>
<body>
  <div id="topbar">
    <div class="crowns" id="crowns-enemy">👑 0</div>
    <div id="timer">3:00</div>
    <div class="crowns right" id="crowns-player">👑 0</div>
  </div>
  <div id="arena3d"></div>
  <div id="bottombar">
    <div id="cardrow">
      <div id="nextwrap"><div class="label">NEXT</div><div id="nextcard"></div></div>
      <div id="hand" style="display:flex; gap:10px; flex:1; justify-content:center;"></div>
    </div>
    <div id="elixirrow">
      <div id="elixirnum">5</div>
      <div id="elixirbar"></div>
    </div>
  </div>
  <div id="hint">Click a card (or press 1–4), then click your half of the arena to deploy. Fireball can be thrown anywhere.</div>
  <div id="overlay">
    <h1 id="result"></h1>
    <h2 id="resultsub"></h2>
    <button onclick="resetGame()">Play Again</button>
  </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";

// logic space stays 540x760 (x right, y down toward the player); SCALE maps it onto the 3D ground plane
const W = 540, H = 760;
const RIVER_Y = H / 2;
const RIVER_H = 44;
const BRIDGES = [120, 420];
const BRIDGE_W = 72;
const SCALE = 0.07;

const TEAMC = {
  player: { main: 0x3b6fd8, dark: 0x26498f, bar: 0x4da3ff },
  enemy:  { main: 0xd84343, dark: 0x8f2626, bar: 0xff5b5b },
};

function wx(x) { return (x - W / 2) * SCALE; }
function wz(y) { return (y - H / 2) * SCALE; }

// ---------------------------------------------------------------- three.js scene
const VIEW_W = 540, VIEW_H = 760;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1c2c);

const camera = new THREE.PerspectiveCamera(55, VIEW_W / VIEW_H, 0.5, 250);
camera.position.set(0, 48, 57);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(VIEW_W, VIEW_H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById("arena3d").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xbcc7e8, 0.75));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.5);
sun.position.set(26, 60, 28);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -28; sun.shadow.camera.right = 28;
sun.shadow.camera.top = 34; sun.shadow.camera.bottom = -34;
sun.shadow.camera.near = 10; sun.shadow.camera.far = 140;
scene.add(sun);

// ---------------------------------------------------------------- mesh helpers
function lam(color) { return new THREE.MeshLambertMaterial({ color }); }
function glow(color, opacity) {
  return new THREE.MeshBasicMaterial({ color, transparent: opacity !== undefined, opacity: opacity === undefined ? 1 : opacity });
}
function shadowed(m) { m.castShadow = true; return m; }
function box(w, h, d, color, x, y, z) {
  const m = shadowed(new THREE.Mesh(new THREE.BoxGeometry(w, h, d), lam(color)));
  m.position.set(x || 0, y || 0, z || 0);
  return m;
}
function sph(r, color, x, y, z) {
  const m = shadowed(new THREE.Mesh(new THREE.SphereGeometry(r, 14, 12), lam(color)));
  m.position.set(x || 0, y || 0, z || 0);
  return m;
}
function cyl(rt, rb, h, color, x, y, z) {
  const m = shadowed(new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 14), lam(color)));
  m.position.set(x || 0, y || 0, z || 0);
  return m;
}
function cone(r, h, color, x, y, z) {
  const m = shadowed(new THREE.Mesh(new THREE.ConeGeometry(r, h, 12), lam(color)));
  m.position.set(x || 0, y || 0, z || 0);
  return m;
}
// a leg/arm hanging from a hip/shoulder pivot so it can swing
function limb(r, len, color, x, pivotY, z) {
  const grp = new THREE.Group();
  grp.position.set(x, pivotY, z);
  grp.add(box(r * 2, len, r * 2, color, 0, -len / 2, 0));
  return grp;
}
function textSprite(txt) {
  const c = document.createElement("canvas");
  c.width = c.height = 128;
  const cc = c.getContext("2d");
  cc.font = "bold 64px Segoe UI, Arial";
  cc.fillStyle = "#ffffff";
  cc.textAlign = "center";
  cc.textBaseline = "middle";
  cc.fillText(txt, 64, 64);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sp.scale.set(1.8, 1.8, 1);
  sp.renderOrder = 50;
  return sp;
}

// ---------------------------------------------------------------- arena ground
{
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(W * SCALE + 7, H * SCALE + 7), lam(0x4f9e44));
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // mowing stripes
  for (let i = 0; i < H / 80; i++) {
    const s = new THREE.Mesh(
      new THREE.PlaneGeometry(W * SCALE, 40 * SCALE),
      new THREE.MeshLambertMaterial({ color: 0x000000, transparent: true, opacity: 0.07 })
    );
    s.rotation.x = -Math.PI / 2;
    s.position.set(0, 0.01, wz(60 + i * 80));
    scene.add(s);
  }

  const river = new THREE.Mesh(new THREE.PlaneGeometry(W * SCALE + 7, RIVER_H * SCALE), lam(0x3b6fd4));
  river.rotation.x = -Math.PI / 2;
  river.position.y = 0.02;
  scene.add(river);

  for (const bx of BRIDGES) {
    const b = box(BRIDGE_W * SCALE, 0.22, (RIVER_H + 10) * SCALE, 0xb08a52, wx(bx), 0.11, 0);
    b.receiveShadow = true;
    scene.add(b);
  }
}

// translucent highlight over the player's half while placing a troop
const deployPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(W * SCALE, (H / 2 - RIVER_H / 2) * SCALE),
  new THREE.MeshBasicMaterial({ color: 0x5096ff, transparent: true, opacity: 0.16, depthWrite: false })
);
deployPlane.rotation.x = -Math.PI / 2;
deployPlane.position.set(0, 0.03, wz((RIVER_Y + RIVER_H / 2 + H) / 2));
deployPlane.visible = false;
scene.add(deployPlane);

// ---------------------------------------------------------------- character builders (all face +X)
function buildKnight(side) {
  const T = TEAMC[side];
  const g = new THREE.Group();
  const legs = [limb(0.18, 0.7, 0x4a3b2a, -0.26, 0.7, 0), limb(0.18, 0.7, 0x4a3b2a, 0.26, 0.7, 0)];
  legs.forEach(l => g.add(l));
  g.add(cyl(0.52, 0.6, 1.05, T.main, 0, 1.25, 0));
  g.add(cyl(0.58, 0.58, 0.16, T.dark, 0, 0.84, 0));            // belt
  g.add(sph(0.4, 0xf1c27d, 0, 2.08, 0));                       // face
  const helm = sph(0.46, 0x99a2b3, 0, 2.2, 0);                 // helmet dome
  helm.scale.y = 0.72;
  g.add(helm);
  const arm = new THREE.Group();                               // sword arm
  arm.position.set(0, 1.68, 0.6);
  arm.add(cyl(0.12, 0.12, 0.55, T.main, 0, -0.28, 0));
  arm.add(box(0.3, 0.08, 0.3, 0x7a5a30, 0, -0.56, 0));         // crossguard
  arm.add(box(0.09, 1.0, 0.2, 0xd7dee9, 0, -1.1, 0));          // blade
  arm.rotation.z = 0.3;
  g.add(arm);
  const shield = cyl(0.42, 0.42, 0.1, 0x8a6840, 0, 1.3, -0.66);
  shield.rotation.x = Math.PI / 2;
  g.add(shield);
  g.userData = { legs, weaponArm: arm, armRest: 0.3, h: 2.7 };
  return g;
}

function buildArcher(side) {
  const T = TEAMC[side];
  const g = new THREE.Group();
  const legs = [limb(0.13, 0.6, 0x2e4d2e, -0.2, 0.6, 0), limb(0.13, 0.6, 0x2e4d2e, 0.2, 0.6, 0)];
  legs.forEach(l => g.add(l));
  g.add(cyl(0.4, 0.48, 0.92, T.main, 0, 1.05, 0));
  g.add(sph(0.32, 0xf1c27d, 0, 1.75, 0));                      // face
  g.add(cone(0.4, 0.62, 0x3f7a46, 0, 2.05, 0));                // hood
  const bow = new THREE.Group();                               // held out front-right
  bow.position.set(0.5, 1.3, 0.35);
  const arc = shadowed(new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.045, 6, 14, Math.PI), lam(0x7a4f23)));
  arc.rotation.y = Math.PI / 2;                                // bow plane perpendicular to shot
  arc.rotation.z = -Math.PI / 2;
  bow.add(arc);
  g.add(bow);
  g.userData = { legs, h: 2.3 };
  return g;
}

function buildGiant(side) {
  const T = TEAMC[side];
  const g = new THREE.Group();
  const legs = [limb(0.3, 0.85, 0x5b4632, -0.45, 0.85, 0), limb(0.3, 0.85, 0x5b4632, 0.45, 0.85, 0)];
  legs.forEach(l => g.add(l));
  const body = sph(1.05, 0xc89a66, 0, 1.9, 0);
  body.scale.y = 1.12;
  g.add(body);
  g.add(cyl(1.07, 1.07, 0.32, T.main, 0, 1.62, 0));            // team belt
  g.add(sph(0.55, 0xe8b984, 0, 3.15, 0));                      // head
  g.add(sph(0.1, 0xa87b4d, 0.5, 3.12, 0));                     // nose
  const armL = new THREE.Group();
  armL.position.set(0, 2.5, -1.05);
  armL.add(cyl(0.26, 0.26, 0.95, 0xc89a66, 0, -0.5, 0));
  armL.add(sph(0.34, 0xe8b984, 0, -1.05, 0));
  armL.rotation.z = 0.2;
  g.add(armL);
  const armR = new THREE.Group();                              // punching arm
  armR.position.set(0, 2.5, 1.05);
  armR.add(cyl(0.26, 0.26, 0.95, 0xc89a66, 0, -0.5, 0));
  armR.add(sph(0.36, 0xe8b984, 0, -1.08, 0));
  armR.rotation.z = 0.2;
  g.add(armR);
  g.userData = { legs, weaponArm: armR, armRest: 0.2, h: 3.9 };
  return g;
}

function buildMiniPekka(side) {
  const T = TEAMC[side];
  const g = new THREE.Group();
  const legs = [limb(0.19, 0.62, 0x14172a, -0.28, 0.62, 0), limb(0.19, 0.62, 0x14172a, 0.28, 0.62, 0)];
  legs.forEach(l => g.add(l));
  g.add(box(0.95, 1.0, 0.8, 0x23263c, 0, 1.15, 0));
  g.add(box(0.34, 0.18, 0.82, T.main, 0, 0.72, 0));            // team trim
  g.add(box(0.62, 0.55, 0.68, 0x2b2f49, 0, 1.95, 0));          // head
  g.add(cone(0.11, 0.55, 0xcdd6e6, 0, 2.5, 0));                // horn
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), glow(0x56c8ff));
  eye.position.set(0.33, 1.95, 0);
  g.add(eye);
  const arm = new THREE.Group();                               // cleaver arm
  arm.position.set(0, 1.62, 0.55);
  arm.add(cyl(0.13, 0.13, 0.5, 0x23263c, 0, -0.25, 0));
  arm.add(box(0.16, 1.05, 0.5, 0xaeb9cc, 0, -1.0, 0.08));      // huge blade
  arm.rotation.z = 0.3;
  g.add(arm);
  g.userData = { legs, weaponArm: arm, armRest: 0.3, h: 2.8 };
  return g;
}

function buildMusketeer(side) {
  const T = TEAMC[side];
  const g = new THREE.Group();
  const legs = [limb(0.15, 0.65, 0x3a3050, -0.22, 0.65, 0), limb(0.15, 0.65, 0x3a3050, 0.22, 0.65, 0)];
  legs.forEach(l => g.add(l));
  g.add(cyl(0.44, 0.55, 1.0, T.main, 0, 1.18, 0));
  g.add(sph(0.34, 0xf1c27d, 0, 1.92, 0));                      // face
  g.add(cyl(0.6, 0.6, 0.07, 0x3a3050, 0, 2.14, 0));            // hat brim
  g.add(cyl(0.28, 0.33, 0.32, 0x4a3f66, 0, 2.32, 0));          // hat crown
  const arm = new THREE.Group();                               // musket arm
  arm.position.set(0, 1.55, 0.5);
  const musket = box(1.55, 0.1, 0.1, 0x6b4a26, 0.62, -0.22, 0);
  arm.add(musket);
  arm.add(box(0.7, 0.13, 0.13, 0x9aa3b2, 1.1, -0.22, 0));      // barrel
  const flash = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6), glow(0xfff3c4, 0.95));
  flash.position.set(1.55, -0.22, 0);
  flash.visible = false;
  arm.add(flash);
  g.add(arm);
  g.userData = { legs, weaponArm: arm, armRest: 0, attackSwing: 0.25, flash, h: 2.7 };
  return g;
}

function buildSkeleton(side) {
  const g = new THREE.Group();
  const legs = [limb(0.09, 0.5, 0xe8e8dc, -0.17, 0.5, 0), limb(0.09, 0.5, 0xe8e8dc, 0.17, 0.5, 0)];
  legs.forEach(l => g.add(l));
  const body = sph(0.42, 0xf2f2ea, 0, 0.95, 0);
  body.scale.y = 1.1;
  g.add(body);
  g.add(sph(0.3, 0xf2f2ea, 0, 1.66, 0));                       // skull
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.055, 6, 6), glow(0x26222b));
  eL.position.set(0.25, 1.72, -0.11);
  const eR = eL.clone();
  eR.position.z = 0.11;
  g.add(eL); g.add(eR);
  const arm = new THREE.Group();                               // bone club
  arm.position.set(0, 1.3, 0.36);
  arm.add(cyl(0.05, 0.05, 0.72, 0xe8e8dc, 0, -0.36, 0));
  arm.add(sph(0.09, 0xe8e8dc, 0.06, -0.72, 0));
  arm.add(sph(0.09, 0xe8e8dc, -0.06, -0.72, 0));
  arm.rotation.z = 0.3;
  g.add(arm);
  g.scale.setScalar(0.85);
  g.userData = { legs, weaponArm: arm, armRest: 0.3, h: 1.9 };
  return g;
}

function buildBabyDragon(side) {
  const g = new THREE.Group();
  const body = sph(0.8, 0x69b35e, 0, 0.85, 0);
  g.add(body);
  const belly = sph(0.52, 0xb9e0a8, 0.38, 0.62, 0);
  belly.scale.set(0.85, 1, 1);
  g.add(belly);
  g.add(sph(0.17, 0xffffff, 0.55, 1.22, -0.27));               // eyes
  g.add(sph(0.17, 0xffffff, 0.55, 1.22, 0.27));
  const pL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), glow(0x26222b));
  pL.position.set(0.68, 1.24, -0.27);
  const pR = pL.clone();
  pR.position.z = 0.27;
  g.add(pL); g.add(pR);
  g.add(sph(0.22, 0x4f9447, 0.74, 0.9, 0));                    // snout
  g.add(cone(0.09, 0.3, 0x3d7a36, -0.3, 1.62, -0.25));         // horns
  g.add(cone(0.09, 0.3, 0x3d7a36, -0.3, 1.62, 0.25));
  const wingL = new THREE.Group();
  wingL.position.set(-0.15, 1.15, -0.45);
  wingL.add(box(0.65, 0.06, 1.05, 0x96d7a0, 0, 0, -0.62));
  g.add(wingL);
  const wingR = new THREE.Group();
  wingR.position.set(-0.15, 1.15, 0.45);
  wingR.add(box(0.65, 0.06, 1.05, 0x96d7a0, 0, 0, 0.62));
  g.add(wingR);
  const fire = new THREE.Mesh(new THREE.ConeGeometry(0.38, 1.5, 10), glow(0xff8c28, 0.8));
  fire.rotation.z = -Math.PI / 2;                              // cone points +X
  fire.position.set(1.75, 0.85, 0);
  fire.visible = false;
  g.add(fire);
  g.userData = { wings: [wingL, wingR], fireCone: fire, h: 2.3 };
  return g;
}

const BUILDERS = {
  knight: buildKnight, archers: buildArcher, giant: buildGiant, minipekka: buildMiniPekka,
  musketeer: buildMusketeer, skeletons: buildSkeleton, babydragon: buildBabyDragon,
};

function buildTowerMesh(t) {
  const T = TEAMC[t.side];
  const g = new THREE.Group();
  const r = t.king ? 2.3 : 1.85, h = t.king ? 4.3 : 3.5;
  const bodyM = cyl(r, r * 1.15, h, 0x9aa0ad, 0, h / 2, 0);
  bodyM.receiveShadow = true;
  g.add(bodyM);
  g.add(cyl(r * 1.12, r * 1.12, 0.5, 0x7e8492, 0, h + 0.22, 0)); // parapet
  g.add(cone(r * 0.95, t.king ? 1.7 : 1.4, T.main, 0, h + 1.25, 0)); // roof
  if (t.king) {
    const crown = new THREE.Group();
    crown.add(cyl(0.55, 0.55, 0.3, 0xffd34d, 0, 0, 0));
    for (const a of [0, 2.09, 4.19]) crown.add(cone(0.13, 0.42, 0xffd34d, Math.cos(a) * 0.42, 0.34, Math.sin(a) * 0.42));
    crown.position.set(0, h + 2.25, 0);
    g.add(crown);
    const zz = textSprite("Zz");
    zz.position.set(1.2, h + 3.4, 0);
    g.add(zz);
    g.userData.zz = zz;
  }
  g.userData.h = h + 2.4;
  return g;
}

// ---------------------------------------------------------------- floating HP bars
function makeBars(e, width) {
  const grp = new THREE.Group();
  const bg = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0x10121c, transparent: true, opacity: 0.75, depthTest: false }));
  const fill = new THREE.Sprite(new THREE.SpriteMaterial({ color: TEAMC[e.side].bar, depthTest: false }));
  bg.scale.set(width, 0.3, 1);
  fill.scale.set(width * 0.94, 0.18, 1);
  bg.renderOrder = 98;
  fill.renderOrder = 99;
  grp.add(bg);
  grp.add(fill);
  grp.userData = { fill, w: width * 0.94 };
  scene.add(grp);
  e.barGrp = grp;
}

function removeEntity(e) {
  if (e.mesh) scene.remove(e.mesh);
  if (e.barGrp) scene.remove(e.barGrp);
}

// ---------------------------------------------------------------- effects & projectiles
let effects = [];
function spawnBlast(x, y, r, color) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), glow(color, 0.55));
  m.position.set(wx(x), 1.0, wz(y));
  scene.add(m);
  effects.push({ mesh: m, life: 0.35, maxLife: 0.35, grow: 3.2, baseOp: 0.55 });
}
function spawnRing(x, y, color) {
  const m = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.07, 6, 24), glow(color, 0.85));
  m.rotation.x = Math.PI / 2;
  m.position.set(wx(x), 0.1, wz(y));
  scene.add(m);
  effects.push({ mesh: m, life: 0.4, maxLife: 0.4, grow: 4.5, baseOp: 0.85 });
}

let projectiles = [];
function projMesh(kind) {
  switch (kind) {
    case "arrow": {
      const m = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 0.85), glow(0xc8a06a));
      return m; // long axis +Z so lookAt() aims it
    }
    case "fire": return new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 8), glow(0xff8c28));
    case "bolt": return new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), glow(0xcfe4ff));
    default:     return new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), glow(0xffd34d));
  }
}
function spawnProjectile(x, y, target, dmg, speed, kind) {
  const mesh = projMesh(kind);
  scene.add(mesh);
  projectiles.push({ x, y, target, dmg, speed, kind, mesh });
}

// ---------------------------------------------------------------- card data
// speed in px/s, range in px past combined radii, hitSpeed in seconds/attack
const CARDS = {
  knight:     { name: "Knight",      emoji: "🗡️", cost: 3, count: 1, hp: 690,  dmg: 86,  hitSpeed: 1.1, speed: 48, range: 6,   sight: 150, radius: 13, targetsAir: false },
  archers:    { name: "Archers",     emoji: "🏹", cost: 3, count: 2, hp: 125,  dmg: 44,  hitSpeed: 1.2, speed: 48, range: 105, sight: 170, radius: 10, targetsAir: true },
  giant:      { name: "Giant",       emoji: "🗿", cost: 5, count: 1, hp: 2000, dmg: 125, hitSpeed: 1.5, speed: 30, range: 6,   sight: 150, radius: 18, targetsAir: false, buildingsOnly: true },
  minipekka:  { name: "Mini PEKKA",  emoji: "🤖", cost: 4, count: 1, hp: 620,  dmg: 330, hitSpeed: 1.8, speed: 62, range: 6,   sight: 150, radius: 12, targetsAir: false },
  musketeer:  { name: "Musketeer",   emoji: "🔫", cost: 4, count: 1, hp: 350,  dmg: 105, hitSpeed: 1.1, speed: 48, range: 130, sight: 175, radius: 11, targetsAir: true },
  skeletons:  { name: "Skeletons",   emoji: "💀", cost: 1, count: 3, hp: 34,   dmg: 34,  hitSpeed: 1.0, speed: 62, range: 5,   sight: 140, radius: 8,  targetsAir: false },
  babydragon: { name: "Baby Dragon", emoji: "🐉", cost: 4, count: 1, hp: 830,  dmg: 105, hitSpeed: 1.6, speed: 52, range: 85,  sight: 160, radius: 14, targetsAir: true, flying: true },
  fireball:   { name: "Fireball",    emoji: "🔥", cost: 4, spell: true, dmg: 325, blast: 58 },
};
const TOWER_SPELL_FACTOR = 0.4; // spells deal reduced damage to towers

// ---------------------------------------------------------------- state
let units = [], towers = [];
let player, enemy;
let selectedSlot, timeLeft, overtime, gameOver;
let aiThink;
let lastTs = null;
let gt = 0;

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeTower(side, x, y, king) {
  const t = {
    tower: true, king, side, x, y,
    radius: king ? 34 : 26,
    hp: king ? 2600 : 1500, maxHp: king ? 2600 : 1500,
    dmg: king ? 70 : 60, hitSpeed: 0.9, range: 175,
    cooldown: 0, active: !king, // king wakes when damaged or a princess tower falls
    flying: false, targetsAir: true,
  };
  t.mesh = buildTowerMesh(t);
  t.mesh.position.set(wx(x), 0, wz(y));
  scene.add(t.mesh);
  makeBars(t, 3.4);
  return t;
}

function resetGame() {
  for (const arr of [units, towers, projectiles, effects]) {
    for (const o of arr) {
      if (o.mesh) scene.remove(o.mesh);
      if (o.barGrp) scene.remove(o.barGrp);
    }
  }
  units = []; projectiles = []; effects = [];
  towers = [
    makeTower("enemy", BRIDGES[0], 130, false),
    makeTower("enemy", BRIDGES[1], 130, false),
    makeTower("enemy", W / 2, 52, true),
    makeTower("player", BRIDGES[0], H - 130, false),
    makeTower("player", BRIDGES[1], H - 130, false),
    makeTower("player", W / 2, H - 52, true),
  ];
  const deck = shuffled(Object.keys(CARDS));
  player = { side: "player", elixir: 5, crowns: 0, hand: deck.slice(0, 4), queue: deck.slice(4) };
  enemy  = { side: "enemy",  elixir: 5, crowns: 0 };
  selectedSlot = -1;
  timeLeft = 180;
  overtime = false;
  gameOver = false;
  aiThink = 2.5;
  document.getElementById("overlay").classList.remove("show");
  renderHand();
  lastTs = null;
}

// ---------------------------------------------------------------- spawning
function spawnCard(side, key, x, y) {
  const c = CARDS[key];
  if (c.spell) { castFireball(side, x, y); return; }
  for (let i = 0; i < c.count; i++) {
    const off = c.count === 1 ? 0 : (i - (c.count - 1) / 2) * (c.radius * 2 + 6);
    const ux = Math.max(16, Math.min(W - 16, x + off));
    const u = {
      side, key,
      x: ux, y,
      hp: c.hp, maxHp: c.hp,
      dmg: c.dmg, hitSpeed: c.hitSpeed, cooldown: c.hitSpeed * 0.5,
      speed: c.speed, range: c.range, sight: c.sight, radius: c.radius,
      flying: !!c.flying, targetsAir: !!c.targetsAir, buildingsOnly: !!c.buildingsOnly,
      target: null, retarget: 0,
      facing: side === "player" ? -Math.PI / 2 : Math.PI / 2,
      walkPhase: Math.random() * 6, attackT: 0, moving: false,
    };
    u.mesh = BUILDERS[key](side);
    scene.add(u.mesh);
    makeBars(u, 1.7);
    units.push(u);
    spawnRing(ux, y, 0xaad2ff);
  }
}

function castFireball(side, x, y) {
  const c = CARDS.fireball;
  spawnBlast(x, y, 2.0, 0xff7820);
  spawnRing(x, y, 0xffc850);
  for (const u of units) {
    if (u.side !== side && Math.hypot(u.x - x, u.y - y) <= c.blast + u.radius) damage(u, c.dmg);
  }
  for (const t of towers) {
    if (t.side !== side && Math.hypot(t.x - x, t.y - y) <= c.blast + t.radius) damage(t, c.dmg * TOWER_SPELL_FACTOR);
  }
}

function damage(e, amount) {
  e.hp -= amount;
  if (e.tower && e.king) e.active = true;
  if (e.hp > 0) return;
  spawnBlast(e.x, e.y, e.tower ? 2.4 : 0.8, e.tower ? 0xc89a66 : 0xffffff);
  if (!e.tower) return;
  // tower destroyed: award crowns, wake the king
  const winner = e.side === "enemy" ? player : enemy;
  if (e.king) {
    winner.crowns = 3;
    endGame(winner === player);
  } else {
    winner.crowns += 1;
    if (overtime) { endGame(winner === player); return; } // sudden death
    const king = towers.find(t => t.side === e.side && t.king);
    if (king) king.active = true;
  }
}

// ---------------------------------------------------------------- targeting & movement
function canHit(att, def) { return !(def.flying && !att.targetsAir); }

function gap(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) - a.radius - b.radius; }

function findTarget(u) {
  let best = null, bestD = Infinity;
  if (!u.buildingsOnly) {
    for (const e of units) {
      if (e.side === u.side || e.hp <= 0 || !canHit(u, e)) continue;
      const d = gap(u, e);
      if (d <= u.sight && d < bestD) { best = e; bestD = d; }
    }
    if (best) return best;
  }
  for (const t of towers) {
    if (t.side === u.side || t.hp <= 0) continue;
    const d = gap(u, t);
    if (d < bestD) { best = t; bestD = d; }
  }
  return best;
}

function moveUnit(u, dt) {
  const t = u.target;
  let tx = t.x, ty = t.y;
  if (!u.flying && (u.y < RIVER_Y) !== (t.y < RIVER_Y)) {
    // ground unit must cross via a bridge
    const bx = Math.abs(u.x - BRIDGES[0]) <= Math.abs(u.x - BRIDGES[1]) ? BRIDGES[0] : BRIDGES[1];
    if (Math.abs(u.x - bx) > BRIDGE_W / 2 - u.radius || Math.abs(u.y - RIVER_Y) > RIVER_H) {
      tx = bx;
      ty = RIVER_Y + (u.y < RIVER_Y ? RIVER_H : -RIVER_H);
    }
  }
  const d = Math.hypot(tx - u.x, ty - u.y);
  if (d < 1) return;
  u.facing = Math.atan2(ty - u.y, tx - u.x);
  u.walkPhase += dt * u.speed * 0.13;
  u.x += (tx - u.x) / d * u.speed * dt;
  u.y += (ty - u.y) / d * u.speed * dt;
  u.x = Math.max(14, Math.min(W - 14, u.x));
  u.y = Math.max(14, Math.min(H - 14, u.y));
}

// ---------------------------------------------------------------- update
function update(dt) {
  if (gameOver) return;

  // elixir (double in the last minute and in overtime)
  const rate = (timeLeft <= 60 || overtime) ? 1 / 1.4 : 1 / 2.8;
  player.elixir = Math.min(10, player.elixir + rate * dt);
  enemy.elixir = Math.min(10, enemy.elixir + rate * dt);

  // clock
  timeLeft -= dt;
  if (timeLeft <= 0) {
    if (!overtime) {
      if (player.crowns !== enemy.crowns) { endGame(player.crowns > enemy.crowns); return; }
      overtime = true;
      timeLeft = 60;
    } else {
      endGame(null);
      return;
    }
  }

  // units
  for (const u of units) {
    u.cooldown -= dt;
    u.retarget -= dt;
    u.attackT = Math.max(0, u.attackT - dt * 3);
    u.moving = false;
    if (!u.target || u.target.hp <= 0 || u.retarget <= 0) {
      u.target = findTarget(u);
      u.retarget = 0.4;
    }
    if (!u.target) continue;
    if (gap(u, u.target) <= u.range) {
      u.facing = Math.atan2(u.target.y - u.y, u.target.x - u.x);
      if (u.cooldown <= 0) {
        u.cooldown = u.hitSpeed;
        u.attackT = 1;
        if (u.range > 30) {
          const kind = u.key === "archers" ? "arrow" : u.key === "babydragon" ? "fire" : "bullet";
          spawnProjectile(u.x, u.y, u.target, u.dmg, 330, kind);
        } else {
          damage(u.target, u.dmg);
        }
        if (gameOver) return;
      }
    } else {
      moveUnit(u, dt);
      u.moving = true;
    }
  }
  units = units.filter(u => {
    if (u.hp <= 0) { removeEntity(u); return false; }
    return true;
  });

  // towers
  for (const t of towers) {
    if (t.hp <= 0 || !t.active) continue;
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    let best = null, bestD = Infinity;
    for (const u of units) {
      if (u.side === t.side) continue;
      const d = gap(t, u);
      if (d <= t.range && d < bestD) { best = u; bestD = d; }
    }
    if (best) {
      t.cooldown = t.hitSpeed;
      spawnProjectile(t.x, t.y, best, t.dmg, 380, "bolt");
    }
  }
  towers = towers.filter(t => {
    if (t.hp <= 0) { removeEntity(t); return false; }
    return true;
  });

  // projectiles
  for (const p of projectiles) {
    if (p.target.hp <= 0) { p.done = true; continue; }
    const d = Math.hypot(p.target.x - p.x, p.target.y - p.y);
    const step = p.speed * dt;
    if (d <= step + p.target.radius) {
      damage(p.target, p.dmg);
      p.done = true;
      if (gameOver) break;
    } else {
      p.x += (p.target.x - p.x) / d * step;
      p.y += (p.target.y - p.y) / d * step;
    }
  }
  projectiles = projectiles.filter(p => {
    if (p.done) { scene.remove(p.mesh); return false; }
    return true;
  });
  if (gameOver) return;

  // enemy AI
  aiThink -= dt;
  if (aiThink <= 0) {
    aiThink = 0.7 + Math.random() * 1.3;
    aiPlay();
  }
}

// ---------------------------------------------------------------- enemy AI
function aiPlay() {
  const threats = units.filter(u => u.side === "player" && u.y < RIVER_Y + 30);

  // fireball a cluster or a beefy attacker
  if (enemy.elixir >= CARDS.fireball.cost && threats.length) {
    const beefy = threats.find(t => t.hp > 380);
    const clustered = threats.filter(t => threats.filter(o => Math.hypot(o.x - t.x, o.y - t.y) < 55).length >= 3);
    const target = clustered[0] || (beefy && Math.random() < 0.5 ? beefy : null);
    if (target) { enemy.elixir -= CARDS.fireball.cost; castFireball("enemy", target.x, target.y); return; }
  }

  const troops = Object.keys(CARDS).filter(k => !CARDS[k].spell && CARDS[k].cost <= enemy.elixir);
  if (!troops.length) return;
  // without a threat, save up a bit before attacking
  if (!threats.length && enemy.elixir < 6 && Math.random() < 0.65) return;

  const key = troops[Math.floor(Math.random() * troops.length)];
  let x, y;
  if (threats.length) {
    const t = threats[Math.floor(Math.random() * threats.length)];
    x = t.x + (Math.random() * 50 - 25);
    y = Math.max(60, t.y - 70);
  } else {
    x = BRIDGES[Math.floor(Math.random() * 2)] + (Math.random() * 60 - 30);
    y = 175 + Math.random() * 130;
  }
  enemy.elixir -= CARDS[key].cost;
  spawnCard("enemy", key, Math.max(20, Math.min(W - 20, x)), Math.min(RIVER_Y - 40, y));
}

// ---------------------------------------------------------------- game end
function endGame(playerWon) {
  gameOver = true;
  const h1 = document.getElementById("result");
  const sub = document.getElementById("resultsub");
  if (playerWon === null) {
    h1.textContent = "Draw!";
    sub.textContent = `${player.crowns} 👑 — ${enemy.crowns} 👑`;
  } else if (playerWon) {
    h1.textContent = "Victory! 🎉";
    sub.textContent = `You win ${player.crowns} 👑 to ${enemy.crowns} 👑`;
  } else {
    h1.textContent = "Defeat 💀";
    sub.textContent = `Enemy wins ${enemy.crowns} 👑 to ${player.crowns} 👑`;
  }
  document.getElementById("overlay").classList.add("show");
}

// ---------------------------------------------------------------- input
function renderHand() {
  const hand = document.getElementById("hand");
  hand.innerHTML = "";
  player.hand.forEach((key, i) => {
    const c = CARDS[key];
    const el = document.createElement("div");
    el.className = "card" + (i === selectedSlot ? " selected" : "") + (player.elixir < c.cost ? " unaffordable" : "");
    el.innerHTML = `<div class="cost">${c.cost}</div><div class="emoji">${c.emoji}</div><div class="cname">${c.name}</div>`;
    el.onclick = () => { if (player.elixir >= c.cost) { selectedSlot = i === selectedSlot ? -1 : i; renderHand(); } };
    hand.appendChild(el);
  });
  const n = CARDS[player.queue[0]];
  document.getElementById("nextcard").innerHTML =
    `<div class="card mini"><div class="cost">${n.cost}</div><div class="emoji">${n.emoji}</div></div>`;
}

const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const hitPoint = new THREE.Vector3();

renderer.domElement.addEventListener("click", ev => {
  if (gameOver || selectedSlot < 0) return;
  const r = renderer.domElement.getBoundingClientRect();
  const ndc = new THREE.Vector2(
    ((ev.clientX - r.left) / r.width) * 2 - 1,
    -((ev.clientY - r.top) / r.height) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  if (!raycaster.ray.intersectPlane(groundPlane, hitPoint)) return;
  const x = hitPoint.x / SCALE + W / 2;
  const y = hitPoint.z / SCALE + H / 2;
  if (x < 0 || x > W || y < 0 || y > H) return;
  const key = player.hand[selectedSlot];
  const c = CARDS[key];
  if (player.elixir < c.cost) return;
  if (!c.spell && y < RIVER_Y + RIVER_H / 2 + 10) return; // troops only on your half
  player.elixir -= c.cost;
  spawnCard("player", key, x, c.spell ? y : Math.max(RIVER_Y + 30, y));
  // cycle the card
  player.hand[selectedSlot] = player.queue.shift();
  player.queue.push(key);
  selectedSlot = -1;
  renderHand();
});

document.addEventListener("keydown", ev => {
  const n = parseInt(ev.key, 10);
  if (n >= 1 && n <= 4) {
    const key = player.hand[n - 1];
    if (player.elixir >= CARDS[key].cost) {
      selectedSlot = selectedSlot === n - 1 ? -1 : n - 1;
      renderHand();
    }
  }
});

// ---------------------------------------------------------------- visual sync (runs every frame, even after game over)
function syncVisuals(dt) {
  deployPlane.visible = !gameOver && selectedSlot >= 0 && !CARDS[player.hand[selectedSlot]].spell;

  for (const u of units) {
    const ud = u.mesh.userData;
    const lunge = u.attackT * 0.4;
    let y = 0;
    if (u.flying) y = 2.1 + Math.sin(gt * 4 + u.walkPhase) * 0.22;
    else if (u.moving) y = Math.abs(Math.sin(u.walkPhase * 2)) * 0.09;
    u.mesh.position.set(
      wx(u.x) + Math.cos(u.facing) * lunge,
      y,
      wz(u.y) + Math.sin(u.facing) * lunge
    );
    u.mesh.rotation.y = -u.facing;
    const swing = u.moving ? Math.sin(u.walkPhase * 2) * 0.55 : 0;
    if (ud.legs) {
      ud.legs[0].rotation.z = swing;
      ud.legs[1].rotation.z = -swing;
    }
    if (ud.weaponArm) {
      const amp = ud.attackSwing !== undefined ? ud.attackSwing : 1.25;
      ud.weaponArm.rotation.z = ud.armRest + Math.sin(u.attackT * Math.PI) * amp;
    }
    if (ud.wings) {
      const f = Math.sin(gt * 10 + u.walkPhase) * 0.45;
      ud.wings[0].rotation.x = f;
      ud.wings[1].rotation.x = -f;
    }
    if (ud.flash) ud.flash.visible = u.attackT > 0.62;
    if (ud.fireCone) {
      ud.fireCone.visible = u.attackT > 0.3;
      ud.fireCone.material.opacity = u.attackT * 0.8;
      const s = 0.6 + u.attackT * 0.6;
      ud.fireCone.scale.set(s, s, s);
    }
    // floating HP bar, shown once damaged
    u.barGrp.visible = u.hp < u.maxHp;
    if (u.barGrp.visible) {
      u.barGrp.position.set(wx(u.x), (u.flying ? 2.1 : 0) + ud.h + 0.55, wz(u.y));
      u.barGrp.userData.fill.scale.x = Math.max(0.01, u.barGrp.userData.w * (u.hp / u.maxHp));
    }
  }

  for (const t of towers) {
    if (t.mesh.userData.zz) t.mesh.userData.zz.visible = !t.active;
    t.barGrp.position.set(wx(t.x), t.mesh.userData.h, wz(t.y));
    t.barGrp.userData.fill.scale.x = Math.max(0.01, t.barGrp.userData.w * (t.hp / t.maxHp));
  }

  for (const p of projectiles) {
    const h = p.target.flying ? 2.2 : 1.4;
    p.mesh.position.set(wx(p.x), h, wz(p.y));
    if (p.kind === "arrow") p.mesh.lookAt(wx(p.target.x), p.target.flying ? 2.2 : 1.2, wz(p.target.y));
  }

  for (const f of effects) {
    f.life -= dt;
    const a = Math.max(0, f.life / f.maxLife);
    f.mesh.material.opacity = a * f.baseOp;
    f.mesh.scale.multiplyScalar(1 + f.grow * dt);
    if (f.life <= 0) scene.remove(f.mesh);
  }
  effects = effects.filter(f => f.life > 0);
}

// ---------------------------------------------------------------- HUD
function drawHud() {
  const m = Math.floor(Math.max(0, timeLeft) / 60);
  const s = Math.floor(Math.max(0, timeLeft) % 60);
  const timer = document.getElementById("timer");
  timer.textContent = (overtime ? "OT " : "") + m + ":" + String(s).padStart(2, "0");
  timer.classList.toggle("double", timeLeft <= 60 || overtime);
  document.getElementById("crowns-player").textContent = "👑 " + player.crowns;
  document.getElementById("crowns-enemy").textContent = "👑 " + enemy.crowns;

  const e = Math.floor(player.elixir);
  document.getElementById("elixirnum").textContent = e;
  const bar = document.getElementById("elixirbar");
  if (!bar.children.length) {
    for (let i = 0; i < 10; i++) {
      const seg = document.createElement("div");
      seg.className = "seg";
      bar.appendChild(seg);
    }
  }
  for (let i = 0; i < 10; i++) bar.children[i].classList.toggle("full", i < e);

  // keep card affordability/selection styling in sync with elixir
  const hand = document.getElementById("hand");
  player.hand.forEach((key, i) => {
    const el = hand.children[i];
    if (!el) return;
    el.classList.toggle("unaffordable", player.elixir < CARDS[key].cost);
    el.classList.toggle("selected", i === selectedSlot);
  });
}

// ---------------------------------------------------------------- main loop
function frame(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;
  gt += dt;
  update(dt);
  syncVisuals(dt);
  drawHud();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

resetGame();
requestAnimationFrame(frame);
</script>
