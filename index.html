<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clasroyale Replica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1c2c;
    color: #eee;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
  }
  #topbar {
    width: 540px;
    max-width: 100vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    font-size: 18px;
    font-weight: 600;
  }
  #timer { font-size: 22px; letter-spacing: 1px; }
  #timer.double { color: #d774ff; }
  .crowns { min-width: 110px; }
  .crowns.right { text-align: right; }
  canvas { border-radius: 8px; cursor: crosshair; display: block; max-width: 100vw; }
  #bottombar {
    width: 540px;
    max-width: 100vw;
    background: #24273a;
    border-radius: 0 0 10px 10px;
    padding: 10px 12px 12px;
  }
  #cardrow { display: flex; gap: 10px; align-items: stretch; }
  #nextwrap { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  #nextwrap .label { font-size: 10px; color: #99a; margin-bottom: 3px; }
  .card {
    background: #3a3f5c;
    border: 2px solid #555c85;
    border-radius: 8px;
    width: 86px;
    padding: 6px 4px 5px;
    text-align: center;
    cursor: pointer;
    transition: transform .08s, border-color .08s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); }
  .card.selected { border-color: #ffd83d; background: #4a5078; }
  .card.unaffordable { opacity: .45; cursor: default; }
  .card.unaffordable:hover { transform: none; }
  .card .emoji { font-size: 30px; line-height: 1.2; }
  .card .cname { font-size: 11px; margin-top: 2px; white-space: nowrap; }
  .card .cost {
    position: absolute; top: -7px; left: -7px;
    background: #b14fd8; border: 2px solid #e2a6ff; border-radius: 50%;
    width: 24px; height: 24px; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .card.mini { width: 56px; padding: 4px 2px 3px; cursor: default; }
  .card.mini .emoji { font-size: 20px; }
  .card.mini .cost { width: 19px; height: 19px; font-size: 11px; top: -6px; left: -6px; }
  #elixirrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  #elixirnum { font-size: 18px; font-weight: 700; color: #d774ff; width: 26px; text-align: center; }
  #elixirbar {
    flex: 1; height: 16px; background: #161825;
    border-radius: 8px; overflow: hidden; display: flex; gap: 2px; padding: 2px;
  }
  #elixirbar .seg { flex: 1; border-radius: 4px; background: #2c2f45; }
  #elixirbar .seg.full { background: linear-gradient(180deg, #e08bff, #a13fd0); }
  #overlay {
    position: fixed; inset: 0; background: rgba(10, 10, 20, .75);
    display: none; align-items: center; justify-content: center; flex-direction: column;
    gap: 18px; z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay h1 { font-size: 46px; }
  #overlay h2 { font-size: 20px; font-weight: 400; color: #bbc; }
  #overlay button {
    font-size: 20px; padding: 12px 34px; border: none; border-radius: 10px;
    background: #ffd83d; color: #222; font-weight: 700; cursor: pointer;
  }
  #overlay button:hover { background: #ffe680; }
  #hint { font-size: 12px; color: #889; padding: 6px; text-align: center; }
</style>
</head>
<body>
  <div id="topbar">
    <div class="crowns" id="crowns-enemy">👑 0</div>
    <div id="timer">3:00</div>
    <div class="crowns right" id="crowns-player">👑 0</div>
  </div>
  <canvas id="arena" width="540" height="760"></canvas>
  <div id="bottombar">
    <div id="cardrow">
      <div id="nextwrap"><div class="label">NEXT</div><div id="nextcard"></div></div>
      <div id="hand" style="display:flex; gap:10px; flex:1; justify-content:center;"></div>
    </div>
    <div id="elixirrow">
      <div id="elixirnum">5</div>
      <div id="elixirbar"></div>
    </div>
  </div>
  <div id="hint">Click a card (or press 1–4), then click your half of the arena to deploy. Fireball can be thrown anywhere.</div>
  <div id="overlay">
    <h1 id="result"></h1>
    <h2 id="resultsub"></h2>
    <button onclick="resetGame()">Play Again</button>
  </div>

<script>
"use strict";

const W = 540, H = 760;
const RIVER_Y = H / 2;
const RIVER_H = 44;
const BRIDGES = [120, 420];
const BRIDGE_W = 72;

const cv = document.getElementById("arena");
const ctx = cv.getContext("2d");

const TEAM = {
  player: { main: "#3b6fd8", dark: "#26498f", trim: "#7fa8f0" },
  enemy:  { main: "#d84343", dark: "#8f2626", trim: "#f08a7f" },
};

// ---------------------------------------------------------------- card data
// speed in px/s, range in px past combined radii, hitSpeed in seconds/attack
const CARDS = {
  knight:     { name: "Knight",      emoji: "🗡️", cost: 3, count: 1, hp: 690,  dmg: 86,  hitSpeed: 1.1, speed: 48, range: 6,   sight: 150, radius: 13, targetsAir: false },
  archers:    { name: "Archers",     emoji: "🏹", cost: 3, count: 2, hp: 125,  dmg: 44,  hitSpeed: 1.2, speed: 48, range: 105, sight: 170, radius: 10, targetsAir: true },
  giant:      { name: "Giant",       emoji: "🗿", cost: 5, count: 1, hp: 2000, dmg: 125, hitSpeed: 1.5, speed: 30, range: 6,   sight: 150, radius: 18, targetsAir: false, buildingsOnly: true },
  minipekka:  { name: "Mini PEKKA",  emoji: "🤖", cost: 4, count: 1, hp: 620,  dmg: 330, hitSpeed: 1.8, speed: 62, range: 6,   sight: 150, radius: 12, targetsAir: false },
  musketeer:  { name: "Musketeer",   emoji: "🔫", cost: 4, count: 1, hp: 350,  dmg: 105, hitSpeed: 1.1, speed: 48, range: 130, sight: 175, radius: 11, targetsAir: true },
  skeletons:  { name: "Skeletons",   emoji: "💀", cost: 1, count: 3, hp: 34,   dmg: 34,  hitSpeed: 1.0, speed: 62, range: 5,   sight: 140, radius: 8,  targetsAir: false },
  babydragon: { name: "Baby Dragon", emoji: "🐉", cost: 4, count: 1, hp: 830,  dmg: 105, hitSpeed: 1.6, speed: 52, range: 85,  sight: 160, radius: 14, targetsAir: true, flying: true },
  fireball:   { name: "Fireball",    emoji: "🔥", cost: 4, spell: true, dmg: 325, blast: 58 },
};
const TOWER_SPELL_FACTOR = 0.4; // spells deal reduced damage to towers

// ---------------------------------------------------------------- state
let units, towers, projectiles, effects;
let player, enemy;
let selectedSlot, timeLeft, overtime, gameOver;
let aiThink;
let lastTs = null;
let gt = 0; // global clock for ambient animation

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeTower(side, x, y, king) {
  return {
    tower: true, king, side, x, y,
    radius: king ? 34 : 26,
    hp: king ? 2600 : 1500, maxHp: king ? 2600 : 1500,
    dmg: king ? 70 : 60, hitSpeed: 0.9, range: 175,
    cooldown: 0, active: !king, // king wakes when damaged or a princess tower falls
    flying: false, targetsAir: true,
  };
}

function resetGame() {
  units = []; projectiles = []; effects = [];
  towers = [
    makeTower("enemy", BRIDGES[0], 130, false),
    makeTower("enemy", BRIDGES[1], 130, false),
    makeTower("enemy", W / 2, 52, true),
    makeTower("player", BRIDGES[0], H - 130, false),
    makeTower("player", BRIDGES[1], H - 130, false),
    makeTower("player", W / 2, H - 52, true),
  ];
  const deck = shuffled(Object.keys(CARDS));
  player = { side: "player", elixir: 5, crowns: 0, hand: deck.slice(0, 4), queue: deck.slice(4) };
  enemy  = { side: "enemy",  elixir: 5, crowns: 0 };
  selectedSlot = -1;
  timeLeft = 180;
  overtime = false;
  gameOver = false;
  aiThink = 2.5;
  document.getElementById("overlay").classList.remove("show");
  renderHand();
  lastTs = null;
}

// ---------------------------------------------------------------- spawning
function spawnCard(side, key, x, y) {
  const c = CARDS[key];
  if (c.spell) { castFireball(side, x, y); return; }
  for (let i = 0; i < c.count; i++) {
    const off = c.count === 1 ? 0 : (i - (c.count - 1) / 2) * (c.radius * 2 + 6);
    const ux = Math.max(16, Math.min(W - 16, x + off));
    units.push({
      side, key,
      x: ux, y,
      hp: c.hp, maxHp: c.hp,
      dmg: c.dmg, hitSpeed: c.hitSpeed, cooldown: c.hitSpeed * 0.5,
      speed: c.speed, range: c.range, sight: c.sight, radius: c.radius,
      flying: !!c.flying, targetsAir: !!c.targetsAir, buildingsOnly: !!c.buildingsOnly,
      target: null, retarget: 0,
      facing: side === "player" ? -Math.PI / 2 : Math.PI / 2,
      walkPhase: Math.random() * 6, attackT: 0, moving: false,
    });
    effects.push({ x: ux, y, r: c.radius + 12, life: 0.35, maxLife: 0.35, color: "170,210,255", ring: true });
  }
}

function castFireball(side, x, y) {
  const c = CARDS.fireball;
  effects.push({ x, y, r: c.blast, life: 0.45, maxLife: 0.45, color: "255,120,30" });
  effects.push({ x, y, r: c.blast + 14, life: 0.4, maxLife: 0.4, color: "255,200,80", ring: true });
  for (const u of units) {
    if (u.side !== side && Math.hypot(u.x - x, u.y - y) <= c.blast + u.radius) damage(u, c.dmg);
  }
  for (const t of towers) {
    if (t.side !== side && Math.hypot(t.x - x, t.y - y) <= c.blast + t.radius) damage(t, c.dmg * TOWER_SPELL_FACTOR);
  }
}

function damage(e, amount) {
  e.hp -= amount;
  if (e.tower && e.king) e.active = true;
  if (e.hp > 0) return;
  effects.push({ x: e.x, y: e.y, r: e.radius + 10, life: 0.3, maxLife: 0.3, color: "255,255,255" });
  if (!e.tower) return;
  // tower destroyed: award crowns, wake the king
  const winner = e.side === "enemy" ? player : enemy;
  if (e.king) {
    winner.crowns = 3;
    endGame(winner === player);
  } else {
    winner.crowns += 1;
    if (overtime) { endGame(winner === player); return; } // sudden death
    const king = towers.find(t => t.side === e.side && t.king);
    if (king) king.active = true;
  }
}

// ---------------------------------------------------------------- targeting & movement
function canHit(att, def) { return !(def.flying && !att.targetsAir); }

function gap(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) - a.radius - b.radius; }

function findTarget(u) {
  let best = null, bestD = Infinity;
  if (!u.buildingsOnly) {
    for (const e of units) {
      if (e.side === u.side || e.hp <= 0 || !canHit(u, e)) continue;
      const d = gap(u, e);
      if (d <= u.sight && d < bestD) { best = e; bestD = d; }
    }
    if (best) return best;
  }
  for (const t of towers) {
    if (t.side === u.side || t.hp <= 0) continue;
    const d = gap(u, t);
    if (d < bestD) { best = t; bestD = d; }
  }
  return best;
}

function moveUnit(u, dt) {
  const t = u.target;
  let tx = t.x, ty = t.y;
  if (!u.flying && (u.y < RIVER_Y) !== (t.y < RIVER_Y)) {
    // ground unit must cross via a bridge
    const bx = Math.abs(u.x - BRIDGES[0]) <= Math.abs(u.x - BRIDGES[1]) ? BRIDGES[0] : BRIDGES[1];
    if (Math.abs(u.x - bx) > BRIDGE_W / 2 - u.radius || Math.abs(u.y - RIVER_Y) > RIVER_H) {
      tx = bx;
      ty = RIVER_Y + (u.y < RIVER_Y ? RIVER_H : -RIVER_H);
    }
  }
  const d = Math.hypot(tx - u.x, ty - u.y);
  if (d < 1) return;
  u.facing = Math.atan2(ty - u.y, tx - u.x);
  u.walkPhase += dt * u.speed * 0.13;
  u.x += (tx - u.x) / d * u.speed * dt;
  u.y += (ty - u.y) / d * u.speed * dt;
  u.x = Math.max(14, Math.min(W - 14, u.x));
  u.y = Math.max(14, Math.min(H - 14, u.y));
}

// ---------------------------------------------------------------- update
function update(dt) {
  if (gameOver) return;

  // elixir (double in the last minute and in overtime)
  const rate = (timeLeft <= 60 || overtime) ? 1 / 1.4 : 1 / 2.8;
  player.elixir = Math.min(10, player.elixir + rate * dt);
  enemy.elixir = Math.min(10, enemy.elixir + rate * dt);

  // clock
  timeLeft -= dt;
  if (timeLeft <= 0) {
    if (!overtime) {
      if (player.crowns !== enemy.crowns) { endGame(player.crowns > enemy.crowns); return; }
      overtime = true;
      timeLeft = 60;
    } else {
      endGame(null);
      return;
    }
  }

  // units
  for (const u of units) {
    u.cooldown -= dt;
    u.retarget -= dt;
    u.attackT = Math.max(0, u.attackT - dt * 3);
    u.moving = false;
    if (!u.target || u.target.hp <= 0 || u.retarget <= 0) {
      u.target = findTarget(u);
      u.retarget = 0.4;
    }
    if (!u.target) continue;
    if (gap(u, u.target) <= u.range) {
      u.facing = Math.atan2(u.target.y - u.y, u.target.x - u.x);
      if (u.cooldown <= 0) {
        u.cooldown = u.hitSpeed;
        u.attackT = 1;
        if (u.range > 30) {
          const kind = u.key === "archers" ? "arrow" : u.key === "babydragon" ? "fire" : "bullet";
          projectiles.push({ x: u.x, y: u.y, target: u.target, dmg: u.dmg, speed: 330, kind });
        } else {
          damage(u.target, u.dmg);
        }
        if (gameOver) return;
      }
    } else {
      moveUnit(u, dt);
      u.moving = true;
    }
  }
  units = units.filter(u => u.hp > 0);

  // towers
  for (const t of towers) {
    if (t.hp <= 0 || !t.active) continue;
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    let best = null, bestD = Infinity;
    for (const u of units) {
      if (u.side === t.side) continue;
      const d = gap(t, u);
      if (d <= t.range && d < bestD) { best = u; bestD = d; }
    }
    if (best) {
      t.cooldown = t.hitSpeed;
      projectiles.push({ x: t.x, y: t.y, target: best, dmg: t.dmg, speed: 380, kind: "bolt" });
    }
  }
  towers = towers.filter(t => t.hp > 0);

  // projectiles
  for (const p of projectiles) {
    if (p.target.hp <= 0) { p.done = true; continue; }
    const d = Math.hypot(p.target.x - p.x, p.target.y - p.y);
    const step = p.speed * dt;
    if (d <= step + p.target.radius) {
      damage(p.target, p.dmg);
      p.done = true;
      if (gameOver) return;
    } else {
      p.x += (p.target.x - p.x) / d * step;
      p.y += (p.target.y - p.y) / d * step;
    }
  }
  projectiles = projectiles.filter(p => !p.done);

  // effects
  for (const f of effects) f.life -= dt;
  effects = effects.filter(f => f.life > 0);

  // enemy AI
  aiThink -= dt;
  if (aiThink <= 0) {
    aiThink = 0.7 + Math.random() * 1.3;
    aiPlay();
  }
}

// ---------------------------------------------------------------- enemy AI
function aiPlay() {
  const threats = units.filter(u => u.side === "player" && u.y < RIVER_Y + 30);

  // fireball a cluster or a beefy attacker
  if (enemy.elixir >= CARDS.fireball.cost && threats.length) {
    const beefy = threats.find(t => t.hp > 380);
    const clustered = threats.filter(t => threats.filter(o => Math.hypot(o.x - t.x, o.y - t.y) < 55).length >= 3);
    const target = clustered[0] || (beefy && Math.random() < 0.5 ? beefy : null);
    if (target) { enemy.elixir -= CARDS.fireball.cost; castFireball("enemy", target.x, target.y); return; }
  }

  const troops = Object.keys(CARDS).filter(k => !CARDS[k].spell && CARDS[k].cost <= enemy.elixir);
  if (!troops.length) return;
  // without a threat, save up a bit before attacking
  if (!threats.length && enemy.elixir < 6 && Math.random() < 0.65) return;

  const key = troops[Math.floor(Math.random() * troops.length)];
  let x, y;
  if (threats.length) {
    const t = threats[Math.floor(Math.random() * threats.length)];
    x = t.x + (Math.random() * 50 - 25);
    y = Math.max(60, t.y - 70);
  } else {
    x = BRIDGES[Math.floor(Math.random() * 2)] + (Math.random() * 60 - 30);
    y = 175 + Math.random() * 130;
  }
  enemy.elixir -= CARDS[key].cost;
  spawnCard("enemy", key, Math.max(20, Math.min(W - 20, x)), Math.min(RIVER_Y - 40, y));
}

// ---------------------------------------------------------------- game end
function endGame(playerWon) {
  gameOver = true;
  const h1 = document.getElementById("result");
  const sub = document.getElementById("resultsub");
  if (playerWon === null) {
    h1.textContent = "Draw!";
    sub.textContent = `${player.crowns} 👑 — ${enemy.crowns} 👑`;
  } else if (playerWon) {
    h1.textContent = "Victory! 🎉";
    sub.textContent = `You win ${player.crowns} 👑 to ${enemy.crowns} 👑`;
  } else {
    h1.textContent = "Defeat 💀";
    sub.textContent = `Enemy wins ${enemy.crowns} 👑 to ${player.crowns} 👑`;
  }
  document.getElementById("overlay").classList.add("show");
}

// ---------------------------------------------------------------- input
function renderHand() {
  const hand = document.getElementById("hand");
  hand.innerHTML = "";
  player.hand.forEach((key, i) => {
    const c = CARDS[key];
    const el = document.createElement("div");
    el.className = "card" + (i === selectedSlot ? " selected" : "") + (player.elixir < c.cost ? " unaffordable" : "");
    el.innerHTML = `<div class="cost">${c.cost}</div><div class="emoji">${c.emoji}</div><div class="cname">${c.name}</div>`;
    el.onclick = () => { if (player.elixir >= c.cost) { selectedSlot = i === selectedSlot ? -1 : i; renderHand(); } };
    hand.appendChild(el);
  });
  const n = CARDS[player.queue[0]];
  document.getElementById("nextcard").innerHTML =
    `<div class="card mini"><div class="cost">${n.cost}</div><div class="emoji">${n.emoji}</div></div>`;
}

cv.addEventListener("click", ev => {
  if (gameOver || selectedSlot < 0) return;
  const r = cv.getBoundingClientRect();
  const x = (ev.clientX - r.left) * (W / r.width);
  const y = (ev.clientY - r.top) * (H / r.height);
  const key = player.hand[selectedSlot];
  const c = CARDS[key];
  if (player.elixir < c.cost) return;
  if (!c.spell && y < RIVER_Y + RIVER_H / 2 + 10) return; // troops only on your half
  player.elixir -= c.cost;
  spawnCard("player", key, x, c.spell ? y : Math.max(RIVER_Y + 30, y));
  // cycle the card
  player.hand[selectedSlot] = player.queue.shift();
  player.queue.push(key);
  selectedSlot = -1;
  renderHand();
});

document.addEventListener("keydown", ev => {
  const n = parseInt(ev.key, 10);
  if (n >= 1 && n <= 4) {
    const key = player.hand[n - 1];
    if (player.elixir >= CARDS[key].cost) {
      selectedSlot = selectedSlot === n - 1 ? -1 : n - 1;
      renderHand();
    }
  }
});

// ---------------------------------------------------------------- drawing helpers
function circle(x, y, rad, fill, stroke, lw) {
  ctx.beginPath();
  ctx.arc(x, y, rad, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1.5; ctx.stroke(); }
}

function ell(x, y, rx, ry, rot, fill) {
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, rot, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
}

function poly(points, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1.5; ctx.stroke(); }
}

function rrect(x, y, w, h, rad, fill, stroke, lw) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x, y, w, h, rad);
  else ctx.rect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 2; ctx.stroke(); }
}

function drawCrown(x, y, s, fill, stroke) {
  poly([
    [x - s, y + s * 0.55], [x - s, y - s * 0.25], [x - s * 0.5, y + s * 0.05],
    [x, y - s * 0.6], [x + s * 0.5, y + s * 0.05], [x + s, y - s * 0.25],
    [x + s, y + s * 0.55],
  ], fill, stroke, 1.5);
}

function drawLegs(u, color) {
  const step = u.moving ? Math.sin(u.walkPhase * 2) * 3 : 0;
  ell(-u.radius * 0.38, u.radius * 0.82 + step * 0.5, 3.2, 4.2, 0, color);
  ell(u.radius * 0.38, u.radius * 0.82 - step * 0.5, 3.2, 4.2, 0, color);
}

function eyes(cy, dx, rad) {
  ctx.fillStyle = "#26222b";
  ctx.beginPath(); ctx.arc(-dx, cy, rad, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(dx, cy, rad, 0, Math.PI * 2); ctx.fill();
}

// ---------------------------------------------------------------- characters
function drawUnit(u) {
  const T = TEAM[u.side];
  const r = u.radius;
  const bob = u.moving ? Math.sin(u.walkPhase * 2) * 1.6 : 0;
  const lunge = u.attackT * 5;
  const fx = Math.cos(u.facing), fy = Math.sin(u.facing);
  // weapon swing angle: sweeps through the target during an attack, rests otherwise
  const swing = u.attackT > 0 ? Math.sin(u.attackT * Math.PI) * 1.1 - 0.45 : 0.5;

  ctx.save();
  ctx.translate(u.x + fx * lunge, u.y + fy * lunge);

  // shadow
  ell(0, u.flying ? r + 9 : r * 0.85, r * 0.9, r * 0.38, 0, "rgba(0,0,0,0.25)");

  if (u.flying) ctx.translate(0, -7 + Math.sin(gt * 4 + u.walkPhase) * 2);
  ctx.translate(0, bob * 0.5);

  switch (u.key) {

    case "knight": {
      drawLegs(u, "#4a3b2a");
      circle(0, 0, r, T.main, T.dark, 2);                       // armored chest
      ell(0, r * 0.25, r * 0.8, r * 0.3, 0, T.dark);            // belt
      circle(0, -r * 0.5, r * 0.6, "#f1c27d");                  // face
      ctx.fillStyle = "#99a2b3";                                // helmet
      ctx.beginPath(); ctx.arc(0, -r * 0.58, r * 0.65, Math.PI, 0); ctx.fill();
      ctx.fillRect(-r * 0.65, -r * 0.62, r * 1.3, r * 0.16);
      eyes(-r * 0.4, r * 0.24, 1.4);
      // sword sweeps toward facing
      ctx.save();
      ctx.rotate(u.facing + swing);
      ctx.translate(r * 0.85, 0);
      poly([[0, -2.2], [r * 1.15, -1.4], [r * 1.3, 0], [r * 1.15, 1.4], [0, 2.2]], "#d7dee9", "#8b94a5", 1);
      ctx.fillStyle = "#7a5a30";
      ctx.fillRect(-5, -3.4, 6, 6.8);                           // hilt
      ctx.restore();
      // shield on off-hand
      ctx.save();
      ctx.rotate(u.facing - 1.7);
      circle(r * 0.85, 0, r * 0.42, "#8a6840", "#5c4528", 1.5);
      ctx.restore();
      break;
    }

    case "archers": {
      drawLegs(u, "#2e4d2e");
      circle(0, 0, r, T.main, T.dark, 2);                       // tunic
      circle(0, -r * 0.48, r * 0.62, "#f1c27d");                // face
      ctx.fillStyle = "#3f7a46";                                // hood
      ctx.beginPath(); ctx.arc(0, -r * 0.52, r * 0.7, Math.PI * 0.85, Math.PI * 2.15); ctx.fill();
      poly([[0, -r * 1.45], [-r * 0.3, -r * 0.95], [r * 0.3, -r * 0.95]], "#3f7a46"); // hood point
      eyes(-r * 0.42, r * 0.22, 1.2);
      // bow held toward facing, string pulls back while attacking
      ctx.save();
      ctx.rotate(u.facing);
      ctx.translate(r * 0.95, 0);
      ctx.strokeStyle = "#7a4f23"; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.85, -1.15, 1.15); ctx.stroke();
      const tipX = Math.cos(1.15) * r * 0.85, tipY = Math.sin(1.15) * r * 0.85;
      const pull = u.attackT > 0 ? -r * 0.55 * u.attackT : tipX;
      ctx.strokeStyle = "#e8e8e8"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(tipX, -tipY); ctx.lineTo(pull, 0); ctx.lineTo(tipX, tipY); ctx.stroke();
      if (u.attackT > 0.4) {                                    // nocked arrow
        ctx.strokeStyle = "#9c6b34"; ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(pull, 0); ctx.lineTo(r * 0.95, 0); ctx.stroke();
      }
      ctx.restore();
      break;
    }

    case "giant": {
      drawLegs(u, "#5b4632");
      circle(0, 0, r, "#c89a66", "#8a6840", 2.5);               // huge torso
      poly([[-r * 0.95, -r * 0.3], [r * 0.4, r * 0.85], [r * 0.75, r * 0.45], [-r * 0.6, -r * 0.75]], T.main); // team sash
      circle(0, -r * 0.42, r * 0.52, "#e8b984", "#8a6840", 1.5); // head
      eyes(-r * 0.5, r * 0.18, 1.6);
      ctx.strokeStyle = "#6e5230"; ctx.lineWidth = 2;            // heavy brow
      ctx.beginPath(); ctx.moveTo(-r * 0.34, -r * 0.62); ctx.lineTo(r * 0.34, -r * 0.62); ctx.stroke();
      ell(0, -r * 0.22, r * 0.16, r * 0.1, 0, "#a87b4d");        // nose
      // fists; the leading one punches forward
      ctx.save();
      ctx.rotate(u.facing);
      const punch = u.attackT * r * 0.55;
      circle(r * 0.7, -r * 0.6, r * 0.3, "#e8b984", "#8a6840", 1.5);
      circle(r * 0.7 + punch, r * 0.6, r * 0.34, "#e8b984", "#8a6840", 1.5);
      ctx.restore();
      break;
    }

    case "minipekka": {
      drawLegs(u, "#14172a");
      circle(0, 0, r, "#23263c", "#0d0f1a", 2);                 // dark armor
      poly([[0, -r * 1.45], [-r * 0.2, -r * 0.6], [r * 0.2, -r * 0.6]], "#cdd6e6", "#8b94a5", 1); // horn
      circle(0, -r * 0.32, r * 0.42, "rgba(86,200,255,0.25)");  // eye glow halo
      circle(0, -r * 0.32, r * 0.24, "#56c8ff");                // single eye
      ell(0, r * 0.35, r * 0.6, r * 0.22, 0, T.main);           // team stripe
      // oversized cleaver
      ctx.save();
      ctx.rotate(u.facing + swing);
      ctx.translate(r * 0.75, 0);
      poly([[0, -3], [r * 1.05, -7], [r * 1.45, -2], [r * 1.4, 5], [0, 3.5]], "#aeb9cc", "#6f7a8d", 1.2);
      ctx.fillStyle = "#3c3325";
      ctx.fillRect(-6, -3, 7, 6);                               // grip
      ctx.restore();
      break;
    }

    case "musketeer": {
      drawLegs(u, "#3a3050");
      circle(0, 0, r, T.main, T.dark, 2);                       // coat
      circle(0, -r * 0.5, r * 0.56, "#f1c27d");                 // face
      eyes(-r * 0.46, r * 0.2, 1.2);
      ell(0, -r * 0.82, r * 0.85, r * 0.26, 0, "#3a3050");      // hat brim
      circle(0, -r * 0.98, r * 0.4, "#4a3f66");                 // hat crown
      circle(r * 0.55, -r * 0.95, r * 0.14, "#e6c84a");         // hat feather pin
      // musket along facing, muzzle flash right after firing
      ctx.save();
      ctx.rotate(u.facing);
      ctx.fillStyle = "#6b4a26";
      ctx.fillRect(r * 0.15, 1.5, r * 1.45, 3.6);               // stock
      ctx.fillStyle = "#9aa3b2";
      ctx.fillRect(r * 1.0, 2.1, r * 0.95, 2.4);                // barrel
      if (u.attackT > 0.62) {
        circle(r * 2.05, 3.3, 4.5 * u.attackT, "rgba(255,210,90,0.9)");
        circle(r * 2.05, 3.3, 2.2 * u.attackT, "#fff3c4");
      }
      ctx.restore();
      break;
    }

    case "skeletons": {
      drawLegs(u, "#e8e8dc");
      circle(0, 0, r, "#f2f2ea", "#b9b9a8", 1.5);               // bony body
      ctx.strokeStyle = "#b9b9a8"; ctx.lineWidth = 1.4;          // ribs
      ctx.beginPath(); ctx.moveTo(-r * 0.5, r * 0.15); ctx.lineTo(r * 0.5, r * 0.15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-r * 0.4, r * 0.45); ctx.lineTo(r * 0.4, r * 0.45); ctx.stroke();
      circle(-r * 0.3, -r * 0.25, 1.9, "#26222b");              // eye sockets
      circle(r * 0.3, -r * 0.25, 1.9, "#26222b");
      ctx.strokeStyle = "#26222b"; ctx.lineWidth = 1;            // grin
      ctx.beginPath(); ctx.moveTo(-r * 0.3, r * 0.05); ctx.lineTo(r * 0.3, r * 0.05); ctx.stroke();
      // little bone club
      ctx.save();
      ctx.rotate(u.facing + swing);
      ctx.translate(r * 0.7, 0);
      ctx.strokeStyle = "#e8e8dc"; ctx.lineWidth = 2.6;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r * 0.9, 0); ctx.stroke();
      circle(r * 0.95, -1.5, 2, "#e8e8dc");
      circle(r * 0.95, 1.5, 2, "#e8e8dc");
      ctx.restore();
      break;
    }

    case "babydragon": {
      const flap = Math.sin(gt * 9 + u.walkPhase) * 0.45;
      ell(-r * 0.95, -r * 0.15, r * 0.72, r * 0.34, -0.5 - flap, "rgba(150,215,160,0.95)"); // wings
      ell(r * 0.95, -r * 0.15, r * 0.72, r * 0.34, 0.5 + flap, "rgba(150,215,160,0.95)");
      circle(0, 0, r, "#69b35e", "#3d7a36", 2);                 // round body
      ell(0, r * 0.3, r * 0.55, r * 0.4, 0, "#b9e0a8");         // belly
      poly([[-r * 0.4, -r * 0.95], [-r * 0.55, -r * 0.45], [-r * 0.25, -r * 0.55]], "#3d7a36"); // horns
      poly([[r * 0.4, -r * 0.95], [r * 0.55, -r * 0.45], [r * 0.25, -r * 0.55]], "#3d7a36");
      circle(-r * 0.28, -r * 0.3, r * 0.22, "#fff");            // big eyes
      circle(r * 0.28, -r * 0.3, r * 0.22, "#fff");
      circle(-r * 0.24, -r * 0.28, r * 0.1, "#26222b");
      circle(r * 0.24, -r * 0.28, r * 0.1, "#26222b");
      ell(0, r * 0.05, r * 0.3, r * 0.18, 0, "#4f9447");        // snout
      // fire breath cone while attacking
      if (u.attackT > 0.3) {
        ctx.save();
        ctx.rotate(u.facing);
        const fl = u.attackT;
        poly([[r * 0.8, 0], [r * 2.3, -r * 0.55], [r * 2.5, 0], [r * 2.3, r * 0.55]], `rgba(255,140,40,${0.55 * fl})`);
        poly([[r * 0.9, 0], [r * 1.9, -r * 0.3], [r * 2.05, 0], [r * 1.9, r * 0.3]], `rgba(255,220,90,${0.7 * fl})`);
        ctx.restore();
      }
      break;
    }
  }

  ctx.restore();
  if (u.hp < u.maxHp) drawHpBar(u);
}

// ---------------------------------------------------------------- towers & projectiles
function drawTower(t) {
  const T = TEAM[t.side];
  const r = t.radius;
  ctx.save();
  ctx.translate(t.x, t.y);

  ell(0, r * 0.55, r * 1.05, r * 0.4, 0, "rgba(0,0,0,0.2)");    // shadow
  rrect(-r, -r, r * 2, r * 2, 6, "#9aa0ad", "#5d626e", 2.5);    // stone body
  ctx.fillStyle = "#7e8492";                                    // battlements
  for (const i of [-1, 0, 1]) ctx.fillRect(i * r * 0.66 - r * 0.17, -r - 5, r * 0.34, 7);
  ctx.strokeStyle = "rgba(0,0,0,0.12)"; ctx.lineWidth = 1;       // brick seams
  ctx.beginPath();
  ctx.moveTo(-r, -r * 0.33); ctx.lineTo(r, -r * 0.33);
  ctx.moveTo(-r, r * 0.33); ctx.lineTo(r, r * 0.33);
  ctx.stroke();
  circle(0, 0, r * 0.58, T.main, T.dark, 2);                    // team roof

  if (t.king) {
    drawCrown(0, 1, r * 0.4, "#ffd34d", "#a8852a");
    if (!t.active) {                                            // sleeping
      ctx.fillStyle = "#fff";
      ctx.font = "bold 13px Segoe UI";
      ctx.textAlign = "center";
      const dz = Math.sin(gt * 2) * 2;
      ctx.fillText("z", r * 0.55, -r * 0.75 + dz);
      ctx.font = "bold 17px Segoe UI";
      ctx.fillText("Z", r * 0.95, -r * 1.05 - dz);
    }
  } else {
    circle(0, 0, r * 0.2, "#ffd34d", "#a8852a", 1.5);           // turret gem
  }

  ctx.restore();
  drawHpBar(t);
}

function drawProjectile(p) {
  const a = Math.atan2(p.target.y - p.y, p.target.x - p.x);
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(a);
  switch (p.kind) {
    case "arrow":
      ctx.strokeStyle = "#8a5a2b"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(5, 0); ctx.stroke();
      poly([[9, 0], [3, -2.6], [3, 2.6]], "#d8dde6");
      poly([[-7, 0], [-10, -2.4], [-8, 0], [-10, 2.4]], "#e0e6ee"); // fletching
      break;
    case "fire":
      ell(-6, 0, 6, 2.6, 0, "rgba(255,140,40,0.5)");            // trail
      circle(0, 0, 5.2, "#ff8c28");
      circle(1.2, 0, 2.8, "#ffe28a");
      break;
    case "bolt":
      ell(-4, 0, 5, 2, 0, "rgba(180,215,255,0.5)");
      ell(0, 0, 5.5, 2.4, 0, "#cfe4ff");
      circle(1, 0, 1.6, "#fff");
      break;
    default: // bullet
      ell(-5, 0, 4.5, 1.6, 0, "rgba(255,211,77,0.45)");
      circle(0, 0, 3, "#ffd34d", "#b8922a", 1);
  }
  ctx.restore();
}

function drawHpBar(e) {
  const w = e.radius * 2.2, h = 5;
  const x = e.x - w / 2, y = e.y - e.radius - 12;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = e.side === "player" ? "#4da3ff" : "#ff5b5b";
  ctx.fillRect(x, y, w * Math.max(0, e.hp / e.maxHp), h);
}

// ---------------------------------------------------------------- scene
function draw() {
  // grass
  ctx.fillStyle = "#4f9e44";
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "rgba(0,0,0,0.06)";
  for (let i = 0; i < H / 40; i++) if (i % 2) ctx.fillRect(0, i * 40, W, 40);

  // deploy zone hint
  if (selectedSlot >= 0 && !CARDS[player.hand[selectedSlot]].spell) {
    ctx.fillStyle = "rgba(80,150,255,0.16)";
    ctx.fillRect(0, RIVER_Y + RIVER_H / 2, W, H - RIVER_Y - RIVER_H / 2);
  }

  // river with drifting highlights
  ctx.fillStyle = "#3b6fd4";
  ctx.fillRect(0, RIVER_Y - RIVER_H / 2, W, RIVER_H);
  for (let i = 0; i < 5; i++) {
    const wx = ((gt * 22 + i * 130) % (W + 60)) - 30;
    ell(wx, RIVER_Y - 8 + (i % 3) * 8, 16, 2.2, 0, "rgba(255,255,255,0.18)");
  }

  // bridges
  for (const bx of BRIDGES) {
    ctx.fillStyle = "#b08a52";
    ctx.fillRect(bx - BRIDGE_W / 2, RIVER_Y - RIVER_H / 2 - 4, BRIDGE_W, RIVER_H + 8);
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx - BRIDGE_W / 2, RIVER_Y - RIVER_H / 2 - 4, BRIDGE_W, RIVER_H + 8);
    ctx.strokeStyle = "rgba(0,0,0,0.12)";                       // planks
    ctx.beginPath();
    for (let px = bx - BRIDGE_W / 2 + 9; px < bx + BRIDGE_W / 2; px += 9) {
      ctx.moveTo(px, RIVER_Y - RIVER_H / 2 - 4);
      ctx.lineTo(px, RIVER_Y + RIVER_H / 2 + 4);
    }
    ctx.stroke();
  }

  for (const t of towers) drawTower(t);

  // units: ground first, flyers on top
  for (const u of units) if (!u.flying) drawUnit(u);
  for (const u of units) if (u.flying) drawUnit(u);

  for (const p of projectiles) drawProjectile(p);

  // effects
  for (const f of effects) {
    const a = f.life / f.maxLife;
    if (f.ring) {
      ctx.strokeStyle = `rgba(${f.color},${0.8 * a})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * (1.6 - 0.6 * a), 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${f.color},${0.5 * a})`;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * (1.3 - 0.3 * a), 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHud() {
  const m = Math.floor(Math.max(0, timeLeft) / 60);
  const s = Math.floor(Math.max(0, timeLeft) % 60);
  const timer = document.getElementById("timer");
  timer.textContent = (overtime ? "OT " : "") + m + ":" + String(s).padStart(2, "0");
  timer.classList.toggle("double", timeLeft <= 60 || overtime);
  document.getElementById("crowns-player").textContent = "👑 " + player.crowns;
  document.getElementById("crowns-enemy").textContent = "👑 " + enemy.crowns;

  const e = Math.floor(player.elixir);
  document.getElementById("elixirnum").textContent = e;
  const bar = document.getElementById("elixirbar");
  if (!bar.children.length) {
    for (let i = 0; i < 10; i++) {
      const seg = document.createElement("div");
      seg.className = "seg";
      bar.appendChild(seg);
    }
  }
  for (let i = 0; i < 10; i++) bar.children[i].classList.toggle("full", i < e);

  // keep card affordability/selection styling in sync with elixir
  const hand = document.getElementById("hand");
  player.hand.forEach((key, i) => {
    const el = hand.children[i];
    if (!el) return;
    el.classList.toggle("unaffordable", player.elixir < CARDS[key].cost);
    el.classList.toggle("selected", i === selectedSlot);
  });
}

// ---------------------------------------------------------------- main loop
function frame(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;
  gt += dt;
  update(dt);
  draw();
  drawHud();
  requestAnimationFrame(frame);
}

resetGame();
requestAnimationFrame(frame);
</script>
</body>
